<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Tài Xế - Trang chủ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .menu-btn { display: block; width: 90%; max-width: 300px; margin: 15px auto; padding: 20px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-new { background: #007bff; }
        .btn-my { background: #28a745; }
        .btn-chat { background: #6f42c1; }
        .btn-logout { background: #dc3545; margin-top: 30px; padding: 10px 20px; width: auto; font-size: 14px; }
        .menu-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>Chào, <span id="driver-name">Tài xế</span>!</h1>
    <p>Bạn muốn làm gì hôm nay?</p>

    <button class="menu-btn btn-new" onclick="window.location.href='new-orders.html'">XEM ĐƠN HÀNG MỚI</button>
    <button class="menu-btn btn-my" onclick="window.location.href='my-orders.html'">QUẢN LÝ ĐƠN CỦA TÔI</button>
    <button class="menu-btn btn-chat" onclick="window.location.href='chat.html'">CHAT VỚI ĐIỀU HÀNH</button>

    <button class="menu-btn btn-logout" onclick="logout()">Đăng xuất</button>

    <script>
        // Kiểm tra đăng nhập ngay khi vào trang
        const driver = JSON.parse(localStorage.getItem('driver'));
        
        if (!driver) {
            alert("Bạn chưa đăng nhập!");
            window.location.href = 'login.html';
        } else {
            document.getElementById('driver-name').innerText = driver.full_name || driver.username;
        }

        function logout() {
            localStorage.removeItem('driver');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
