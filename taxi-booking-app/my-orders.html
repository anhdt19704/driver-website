<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng của tôi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-detail { background: #0056b3; color: white; }
        .btn-finish { background: #008952; color: white; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:400px; }
    </style>
</head>
<body>
    <button onclick="window.location.href='driver.html'">⬅ Quay lại</button>
    <h2>Danh sách đơn hàng</h2>
    <div id="orderList">Đang tải đơn hàng...</div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <h3>Chi tiết đơn hàng</h3>
            <div id="modalContent"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; background:#6c757d; color:white;">Đóng</button>
        </div>
    </div>

    <script>
        let allOrders = [];

        // Hàm lấy dữ liệu tài xế đồng nhất
        function getDriverId() {
            const driverData = JSON.parse(localStorage.getItem('driver'));
            return driverData ? driverData.id : null;
        }

        async function loadOrders() {
            const dId = getDriverId();
            if (!dId) {
                window.location.href = 'login.html';
                return;
            }
            try {
                // Giả định API này trả về đơn hàng của tài xế dựa trên dId
                const res = await fetch(`/api/driver/orders?driverId=${dId}`);
                allOrders = await res.json();
                renderOrders(allOrders);
            } catch (err) {
                document.getElementById('orderList').innerText = "Lỗi tải dữ liệu.";
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            if (orders.length === 0) { list.innerHTML = "<p>Bạn chưa có đơn hàng nào.</p>"; return; }
            
            list.innerHTML = orders.map(o => `
                <div class="order-card">
                    <p><strong>Khách hàng:</strong> ${o.customer_name}</p>
                    <p><strong>Trạng thái:</strong> ${o.status === 'completed' ? '✅ Đã hoàn thành' : o.status}</p>
                    <button class="btn-detail" onclick="showDetails(${o.id})">Xem chi tiết</button>
                    ${o.status !== 'completed' ? `<button class="btn-finish" onclick="updateStatus(${o.id}, 'completed')">HOÀN THÀNH</button>` : ''}
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            const dId = getDriverId();
            if (!dId) {
                alert("Bạn chưa đăng nhập!");
                return;
            }

            try {
                const response = await fetch('/api/driver/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: orderId, status: newStatus, driverId: dId })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert("Cập nhật thành công!");
                    loadOrders();
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (err) {
                alert("Lỗi kết nối Server!");
            }
        }

        function showDetails(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            document.getElementById('modalContent').innerHTML = `
                <p><strong>Khách hàng:</strong> ${order.customer_name}</p>
                <p><strong>SĐT:</strong> ${order.phone}</p>
                <p><strong>Lộ trình:</strong> ${order.pickup_location} ➔ ${order.destination}</p>
                <p><strong>Giá tiền:</strong> ${parseFloat(order.price || 0).toLocaleString('vi-VN')} đ</p>
                <p><strong>Trạng thái:</strong> ${order.status}</p>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        
        loadOrders();
    </script>
</body>
</html>
