<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng của tôi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-detail { background: #0056b3; color: white; }
        .btn-finish { background: #008952; color: white; }
        /* Modal Style */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:400px; }
    </style>
</head>
<body>
    <h2>Danh sách đơn hàng</h2>
    <div id="orderList">Đang tải đơn hàng...</div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <h3>Chi tiết đơn hàng</h3>
            <div id="modalContent"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; background:#6c757d; color:white;">Đóng</button>
        </div>
    </div>

    <script>
        let allOrders = []; // Lưu danh sách đơn hàng toàn cục

        async function loadOrders() {
            try {
                const res = await fetch('/api/driver/orders'); // Đường dẫn tương đối
                allOrders = await res.json();
                renderOrders(allOrders);
            } catch (err) {
                document.getElementById('orderList').innerText = "Lỗi tải đơn hàng.";
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            list.innerHTML = orders.map(o => `
                <div class="order-card">
                    <p><strong>Khách hàng:</strong> ${o.customer_name}</p>
                    <p><strong>Trạng thái:</strong> ${o.status === 'completed' ? '✅ Đã hoàn thành' : o.status}</p>
                    <button class="btn-detail" onclick="showDetails(${o.id})">Xem chi tiết</button>
                    ${o.status !== 'completed' ? `<button class="btn-finish" onclick="finishOrder(${o.id})">HOÀN THÀNH</button>` : ''}
                </div>
            `).join('');
        }

        function showDetails(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;

        // Định dạng lại ngày đón cho dễ đọc
        const displayDate = order.pickup_date ? new Date(order.pickup_date).toLocaleDateString('vi-VN') : 'Chưa có';
        const displayTime = order.pickup_time ? order.pickup_time.substring(0, 5) : 'Chưa có';

        document.getElementById('modalContent').innerHTML = `
            <p><strong>Khách hàng:</strong> ${order.customer_name}</p>
            <p><strong>SĐT:</strong> ${order.phone}</p>
            <p><strong>Ngày đón:</strong> ${displayDate} lúc ${displayTime}</p>
            <p><strong>Điểm đón:</strong> ${order.pickup_location}</p>
            <p><strong>Điểm đến:</strong> ${order.destination}</p>
            <p><strong>Số điểm dừng thêm:</strong> ${order.stops || 0} điểm</p>
            <p><strong>Giá tiền:</strong> ${parseFloat(order.price || 0).toLocaleString('vi-VN')} đ</p>
            <p><strong>Trạng thái:</strong> ${order.status}</p>
        `;
        document.getElementById('detailModal').style.display = 'flex';
    }

        async function finishOrder(id) {
    const dId = localStorage.getItem('driverId');
    
    // Debug: Kiểm tra dữ liệu trước khi gửi
    console.log("Dữ liệu gửi lên server:", { id: id, status: 'completed', driverId: dId });

    if (!dId) {
        alert("Bạn chưa đăng nhập hoặc không tìm thấy ID tài xế!");
        return;
    }

    try {
        const res = await fetch('/api/driver/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, status: 'completed', driverId: dId })
        });
        const data = await res.json();
        if (data.success) {
            alert("Đã cập nhật thành công!");
            loadOrders();
        } else {
            alert("Lỗi từ server: " + (data.message || "Không xác định"));
        }
    } catch (err) { alert("Không thể kết nối server!"); }
}

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        loadOrders();
    </script>
</body>
</html>
