<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #f4f4f4; font-family: Arial, sans-serif; 
        }
        .login-box { 
            background: white; padding: 30px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; 
        }
        h2 { text-align: center; color: #333; }
        input { 
            display: block; width: 100%; margin: 15px 0; padding: 12px; 
            border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 12px; background: #007bff; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Đăng nhập Admin</h2>
        <input type="text" id="user" placeholder="Tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="adminLogin()">Đăng nhập</button>
    </div>

    <script>
        async function adminLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            try {
                const res = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin.html';
                } else {
                    alert(data.message || 'Sai tài khoản hoặc mật khẩu!');
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                alert("Không thể kết nối đến server. Hãy đảm bảo bạn đã chạy 'node server.js'!");
            }
        }
    </script>
</body>
</html>
