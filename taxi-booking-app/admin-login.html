<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0;
            background: linear-gradient(135deg, #008952, #005f3a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-box { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 320px; text-align: center;
        }
        h2 { color: #333; margin-bottom: 25px; font-weight: 600; }
        input { 
            display: block; width: 100%; margin-bottom: 20px; padding: 14px; 
            border: 2px solid #eee; border-radius: 8px; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: #008952; outline: none; }
        button { 
            width: 100%; padding: 14px; background: #008952; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #006a3f; transform: translateY(-2px); }
        .icon { font-size: 40px; margin-bottom: 10px; color: #008952; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">🔒</div>
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button id="loginBtn" onclick="adminLogin()">Đăng nhập</button>
    </div>

    <script>
        async function adminLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('loginBtn');

            if (!user || !pass) {
                alert("Vui lòng nhập đủ tài khoản và mật khẩu!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Đang xử lý...";

            try {
                // Đường dẫn đã sửa thành tương đối để chạy trên mọi môi trường
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin-hub.html';
                } else {
                    alert(data.message || 'Sai tài khoản hoặc mật khẩu!');
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                alert("Không thể kết nối đến server. Vui lòng kiểm tra lại mạng hoặc server!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Đăng nhập";
            }
        }
    </script>
</body>
</html>
