<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Quản lý Đơn hàng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #008952; margin: 10px 0 0 0; }
        
        .filter-container { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input, select, button { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { cursor: pointer; background: #008952; color: white; border: none; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #008952; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <h2>Quản lý đơn hàng (Admin)</h2>

    <div class="stats-container">
        <div class="stat-card"><h3>Tổng đơn</h3><p id="totalAll" class="stat-value">0</p></div>
        <div class="stat-card"><h3>Đang chờ</h3><p id="totalPending" class="stat-value">0</p></div>
        <div class="stat-card"><h3>Đã hoàn thành</h3><p id="totalCompleted" class="stat-value">0</p></div>
        <div class="stat-card"><h3>Doanh thu</h3><p id="totalRevenue" class="stat-value">0 đ</p></div>
    </div>

    <div class="filter-container">
        <input type="text" id="filterDriver" placeholder="Tên tài xế..." oninput="applyFilters()">
        <select id="timeRange" onchange="applyFilters()">
            <option value="all">Tất cả thời gian</option>
            <option value="day">Hôm nay</option>
            <option value="week">Trong tuần này</option>
            <option value="month">Trong tháng này</option>
        </select>
        <button style="background:#6c757d;" onclick="window.location.reload()">Reset</button>
    </div>

    <table>
        <thead>
            <tr><th>ID</th><th>Khách</th><th>SĐT</th><th>Lộ trình</th><th>Tài xế</th><th>Trạng thái</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="bookingBody"></tbody>
    </table>

    <div id="detailModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:400px;">
            <h3>Chi tiết đơn hàng</h3>
            <div id="modalContent"></div>
            <button onclick="document.getElementById('detailModal').style.display='none'">Đóng</button>
        </div>
    </div>
<a href="admin-hub.html" style="
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    background-color: #6c757d;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    font-size: 14px;">
    &larr; Quay lại Hub
</a>
    <script>
        let allData = [];

        async function loadAdminData() {
            try {
                const res = await fetch('http://localhost:3000/api/all-bookings');
                allData = await res.json();
                applyFilters();
            } catch (err) { console.error("Lỗi tải dữ liệu:", err); }
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return 'Chưa có';
            const d = new Date(dateStr);
            return d.toLocaleTimeString('vi-VN') + ' ' + d.toLocaleDateString('vi-VN');
        }

        function applyFilters() {
            const driverName = document.getElementById('filterDriver').value.toLowerCase();
            const range = document.getElementById('timeRange').value;
            const now = new Date();

            const filtered = allData.filter(b => {
                const matchDriver = (b.driver_name || "").toLowerCase().includes(driverName);
                const bDate = new Date(b.created_at);
                let matchTime = true;
                
                if (range === 'day') matchTime = bDate.toDateString() === now.toDateString();
                else if (range === 'week') {
                    const startOfWeek = new Date(now);
                    startOfWeek.setDate(now.getDate() - now.getDay());
                    matchTime = bDate >= startOfWeek;
                } else if (range === 'month') matchTime = bDate.getMonth() === now.getMonth();

                return matchDriver && matchTime;
            });

            renderTable(filtered);
            updateStats(filtered);
        }

        function updateStats(data) {
            const totalAll = data.length;
            const pending = data.filter(b => b.status === 'pending' || b.status === 'assigned').length;
            const completedList = data.filter(b => b.status === 'completed');
            const revenue = completedList.reduce((sum, b) => sum + (parseFloat(b.price) || 0), 0);

            document.getElementById('totalAll').innerText = totalAll;
            document.getElementById('totalPending').innerText = pending;
            document.getElementById('totalCompleted').innerText = completedList.length;
            document.getElementById('totalRevenue').innerText = revenue.toLocaleString('vi-VN') + ' đ';
        }

        function renderTable(data) {
            document.getElementById('bookingBody').innerHTML = data.map(b => `<tr>
                <td>${b.id}</td><td>${b.customer_name}</td><td>${b.phone}</td>
                <td>${b.pickup_location} ➔ ${b.destination}</td>
                <td>${b.driver_name || 'Chưa gán'}</td>
                <td>${b.status}</td>
                <td>
                    <button onclick="showDetails(${b.id})">Chi tiết</button>
                    <span class="delete-btn" onclick="deleteOrder(${b.id})">Xóa</span>
                </td>
            </tr>`).join('');
        }

        function showDetails(id) {
            const order = allData.find(b => b.id === id);
            if (!order) return;
            document.getElementById('modalContent').innerHTML = `
                <p><strong>Khách hàng:</strong> ${order.customer_name}</p>
                <p><strong>SĐT:</strong> ${order.phone}</p>
                <p><strong>Lộ trình:</strong> ${order.pickup_location} ➔ ${order.destination}</p>
                <p><strong>Tài xế:</strong> ${order.driver_name || 'Chưa gán'}</p>
                <hr>
                <p><strong>Thời gian nhận đơn:</strong> ${formatDateTime(order.created_at)}</p>
                <p><strong>Thời gian hoàn thành:</strong> ${formatDateTime(order.completed_at)}</p>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        async function deleteOrder(id) {
            if(confirm('Bạn có chắc chắn muốn xóa đơn hàng này?')) {
                await fetch('http://localhost:3000/api/delete-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                location.reload();
            }
        }
        
        loadAdminData();
    </script>
</body>
</html>
