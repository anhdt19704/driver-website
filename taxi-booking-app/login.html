<div class="login-box">
    <h2 id="title">Đăng nhập Tài xế</h2>
    <input type="text" id="username" placeholder="Tên đăng nhập">
    <input type="password" id="password" placeholder="Mật khẩu">
    <input type="text" id="fullname" placeholder="Họ tên (chỉ dùng khi đăng ký)" style="display:none;">

    <style>
    /* Tổng thể màn hình */
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #008952, #005f3a);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Khung chứa form */
    .login-box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 320px;
        text-align: center;
        transition: all 0.3s ease;
    }

    h2 { color: #333; margin-bottom: 25px; }

    /* Các ô nhập liệu */
    input {
        display: block;
        width: 100%;
        margin-bottom: 15px;
        padding: 14px;
        border: 2px solid #eee;
        border-radius: 8px;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }

    input:focus {
        border-color: #008952;
        outline: none;
    }

    /* Nút chính */
    button {
        width: 100%;
        padding: 14px;
        background: #008952;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s, transform 0.2s;
    }

    button:hover {
        background: #006a3f;
        transform: translateY(-2px);
    }

    /* Link chuyển đổi */
    #toggleText {
        margin-top: 20px;
        color: #666;
        font-size: 14px;
        text-decoration: underline;
        transition: color 0.3s;
    }

    #toggleText:hover {
        color: #008952;
    }
</style>
    
    <button id="mainBtn" onclick="handleAuth()">Đăng nhập</button>
    <p onclick="toggleMode()" id="toggleText" style="cursor:pointer; color:blue;">Chưa có tài khoản? Đăng ký ngay</p>
</div>

<script>
    let isLogin = true;
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Đăng nhập Tài xế" : "Đăng ký Tài xế";
        document.getElementById('mainBtn').innerText = isLogin ? "Đăng nhập" : "Đăng ký";
        document.getElementById('toggleText').innerText = isLogin ? "Chưa có tài khoản? Đăng ký ngay" : "Đã có tài khoản? Đăng nhập";
        document.getElementById('fullname').style.display = isLogin ? "none" : "block";
    }

    async function handleAuth() {
    const url = isLogin ? 'http://localhost:3000/api/auth/login' : 'http://localhost:3000/api/auth/register';
    const body = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        full_name: document.getElementById('fullname').value
    };
    
    try {
        const res = await fetch(url, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(body) 
        });
        const data = await res.json();
        
        if(data.success) {
            if(isLogin) {
                // Đăng nhập thành công -> Lưu session và chuyển trang
                localStorage.setItem('driver', JSON.stringify(data.driver));
                window.location.href = 'driver.html';
            } else {
                // Đăng ký thành công -> Thông báo và tự động chuyển về form đăng nhập
                alert("Đăng ký thành công! Vui lòng đăng nhập.");
                toggleMode(); // Chuyển về form đăng nhập
            }
        } else {
            alert(data.message || "Có lỗi xảy ra, vui lòng thử lại.");
        }
    } catch (err) {
        console.error(err);
        alert("Không thể kết nối đến server. Hãy kiểm tra server!");
    }
}
</script>
