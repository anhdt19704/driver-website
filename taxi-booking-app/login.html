<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Tài xế</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #008952, #005f3a); font-family: 'Segoe UI', Tahoma, sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 14px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #008952; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #toggleText { margin-top: 20px; color: #666; font-size: 14px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 id="title">Đăng nhập Tài xế</h2>
    <input type="text" id="username" placeholder="Tên đăng nhập" required>
    <input type="password" id="password" placeholder="Mật khẩu" required>
    <input type="text" id="fullname" placeholder="Họ tên" style="display:none;">

    <button id="mainBtn" onclick="handleAuth()">Đăng nhập</button>
    <p id="toggleText" onclick="toggleMode()">Chưa có tài khoản? Đăng ký ngay</p>
</div>

<script>
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Đăng nhập Tài xế" : "Đăng ký Tài xế";
        document.getElementById('mainBtn').innerText = isLogin ? "Đăng nhập" : "Đăng ký";
        document.getElementById('toggleText').innerText = isLogin ? "Chưa có tài khoản? Đăng ký ngay" : "Đã có tài khoản? Đăng nhập";
        document.getElementById('fullname').style.display = isLogin ? "none" : "block";
    }

    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const fullname = document.getElementById('fullname').value.trim();
        const btn = document.getElementById('mainBtn');

        if (!username || !password || (!isLogin && !fullname)) {
            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Đang xử lý...";

        try {
            const response = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, full_name: fullname })
            });

            const data = await response.json();

            if (data.success) {
                if (isLogin) {
                    // Lưu object driver để các trang khác dùng driver.id
                    localStorage.setItem('driver', JSON.stringify(data.driver));
                    window.location.href = 'driver.html';
                } else {
                    alert("Đăng ký thành công!");
                    toggleMode();
                }
            } else {
                alert(data.message || "Đăng nhập thất bại");
            }
        } catch (err) {
            alert("Lỗi kết nối server!");
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? "Đăng nhập" : "Đăng ký";
        }
    }
</script>
</body>
</html>
