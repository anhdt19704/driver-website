<div class="login-box">
    <h2 id="title">Đăng nhập Tài xế</h2>
    <input type="text" id="username" placeholder="Tên đăng nhập" required>
    <input type="password" id="password" placeholder="Mật khẩu" required>
    <input type="text" id="fullname" placeholder="Họ tên (chỉ dùng khi đăng ký)" style="display:none;">

    <button id="mainBtn" onclick="handleAuth()">Đăng nhập</button>
    <p onclick="toggleMode()" id="toggleText" style="cursor:pointer; color:blue; margin-top: 15px;">Chưa có tài khoản? Đăng ký ngay</p>
</div>

<style>
    /* Giữ nguyên CSS cũ của bạn, thêm style cho button đang loading */
    button:disabled { background: #ccc; cursor: not-allowed; }
</style>

<script>
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Đăng nhập Tài xế" : "Đăng ký Tài xế";
        document.getElementById('mainBtn').innerText = isLogin ? "Đăng nhập" : "Đăng ký";
        document.getElementById('toggleText').innerText = isLogin ? "Chưa có tài khoản? Đăng ký ngay" : "Đã có tài khoản? Đăng nhập";
        document.getElementById('fullname').style.display = isLogin ? "none" : "block";
    }

    async function handleAuth() {
        const btn = document.getElementById('mainBtn');
        const url = isLogin ? '/api/auth/login' : '/api/auth/register'; // ĐÃ SỬA: Dùng đường dẫn tương đối
        
        const body = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            full_name: document.getElementById('fullname').value
        };

        if (!body.username || !body.password) {
            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
        }
        
        // Hiệu ứng chờ
        btn.disabled = true;
        btn.innerText = "Đang xử lý...";
        
        try {
            const res = await fetch(url, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(body) 
            });
            
            const data = await res.json();
            
            if(data.success) {
                if(isLogin) {
                    localStorage.setItem('driver', JSON.stringify(data.driver));
                    window.location.href = 'driver.html';
                } else {
                    alert("Đăng ký thành công! Vui lòng đăng nhập.");
                    toggleMode();
                }
            } else {
                alert(data.message || "Có lỗi xảy ra!");
            }
        } catch (err) {
            console.error(err);
            alert("Không thể kết nối đến server. Vui lòng thử lại sau!");
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? "Đăng nhập" : "Đăng ký";
        }
    }
</script>
