<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Nội Bài Nhanh - 0376.291.926</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #008952; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        select, input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .price-box { background: #e8f5e9; border: 2px dashed #008952; padding: 20px; text-align: center; margin-top: 25px; border-radius: 15px; }
        .price-value { font-size: 28px; font-weight: bold; color: #008952; }
        .zalo-btn { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 10px; background: #008952; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .zalo-btn:hover { background: #006a3f; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚕 ĐẶT XE DỊCH VỤ</h2>
    
    <label>Tên khách hàng</label>
    <input type="text" id="name" placeholder="Nhập tên của bạn">

    <label>Lộ trình</label>
    <select id="route" onchange="updatePrice()">
        <option value="HN_NB">Hà Nội - Nội Bài</option>
        <option value="NB_HN">Nội Bài - Hà Nội</option>
        <option value="TOUR_NB">Tour Hà Nội - Ninh Bình</option>
    </select>

    <label>Loại xe</label>
    <select id="vehicle_type" onchange="updatePrice()">
        <option value="4">Xe 4 chỗ</option>
        <option value="7">Xe 7 chỗ</option>
        <option value="16">Xe 16 chỗ</option>
    </select>

    <label>Ngày đón</label>
    <input type="date" id="pickupDate">
    
    <label>Giờ đón</label>
    <input type="time" id="pickupTime">

    <label>Số điểm đón thêm (50.000đ/điểm)</label>
    <input type="number" id="extraStops" value="0" min="0" oninput="updatePrice()">

    <div class="price-box">
        <div>GIÁ TRỌN GÓI DỰ KIẾN:</div>
        <div id="priceDisplay" class="price-value">250.000đ</div>
    </div>

    <label>Số điện thoại</label>
    <input type="tel" id="phone" placeholder="Nhập số điện thoại">

    <label>Điểm đón cụ thể</label>
    <input type="text" id="pickup" placeholder="Số nhà, tên đường...">

    <button class="zalo-btn" onclick="submitBooking()">🚀 ĐẶT XE NGAY</button>
</div>

<script>
    // Thiết lập mặc định ngày giờ hiện tại
    document.getElementById('pickupDate').valueAsDate = new Date();
    document.getElementById('pickupTime').value = new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});

    function updatePrice() {
        // Bảng giá chi tiết
        const prices = {
            "HN_NB": { "4": 250000, "7": 350000, "16": 550000 },
            "NB_HN": { "4": 300000, "7": 400000, "16": 600000 },
            "TOUR_NB": { "4": 1800000, "7": 2000000, "16": 3000000 }
        };
        const route = document.getElementById('route').value;
        const vehicle = document.getElementById('vehicle_type').value;
        const stops = parseInt(document.getElementById('extraStops').value) || 0;
        
        const total = prices[route][vehicle] + (stops * 50000);
        document.getElementById('priceDisplay').innerText = total.toLocaleString('vi-VN') + 'đ';
    }

    async function submitBooking() {
        const bookingData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            route: document.getElementById('route').value,
            vehicle: document.getElementById('vehicle_type').value,
            date: document.getElementById('pickupDate').value,
            time: document.getElementById('pickupTime').value,
            stops: document.getElementById('extraStops').value,
            pickup: document.getElementById('pickup').value,
            price: document.getElementById('priceDisplay').innerText
        };

        if (!bookingData.name || !bookingData.phone || !bookingData.pickup) {
            alert("Vui lòng nhập đầy đủ tên, số điện thoại và địa chỉ đón!");
            return;
        }

        try {
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });
            const result = await res.json();
            if (result.success) {
                alert("✅ Đặt xe thành công! Chúng tôi sẽ liên hệ với bạn.");
            } else {
                alert("❌ Lỗi: " + result.message);
            }
        } catch (error) {
            alert("Không thể kết nối đến server. Vui lòng kiểm tra đường truyền!");
        }
    }
</script>
</body>
</html>
