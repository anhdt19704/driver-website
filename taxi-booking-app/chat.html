<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Tài Xế</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 10px; }
        .back-btn { padding: 10px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px; width: fit-content; }
        #chat-box { flex-grow: 1; border-radius: 10px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; background: white; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #e9ecef; max-width: 80%; word-wrap: break-word; }
        .my-msg { background: #0084ff; color: white; align-self: flex-end; }
        .input-area { display: flex; gap: 5px; padding-bottom: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.location.href='driver.html'">⬅ Quay lại</button>
    <h3 style="text-align:center; margin-top:0;">Kênh Trao Đổi Tài Xế</h3>
    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const driver = JSON.parse(localStorage.getItem('driver'));
        if (!driver) window.location.href = 'login.html';

        // ĐÃ SỬA: Bỏ 'http://localhost:3000' để Socket.io tự nhận URL hiện tại
        const socket = io(); 
        const chatBox = document.getElementById('chat-box');

        function addMessageToBox(data) {
            const div = document.createElement('div');
            // So sánh tên để biết tin nhắn của ai
            const isMyMsg = data.user.trim().toLowerCase() === driver.full_name.trim().toLowerCase();
            
            div.className = 'msg' + (isMyMsg ? ' my-msg' : '');
            div.innerHTML = `<b>${data.user}:</b> ${data.msg} <br><small style="font-size:0.7em; opacity:0.7">${data.time || ''}</small>`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if(!msg) return;
            
            const messageData = { 
                user: driver.full_name, 
                msg: msg, 
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            socket.emit('chat_message', messageData);
            input.value = '';
        }

        socket.on('new_chat_message', (data) => {
            addMessageToBox(data);
        });

        socket.on('load_chat_history', (history) => {
            chatBox.innerHTML = ''; 
            history.forEach(data => addMessageToBox(data));
        });
    </script>
</body>
</html>
